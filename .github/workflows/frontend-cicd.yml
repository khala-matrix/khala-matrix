name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cicd.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: kha-frontend
  CONTAINER_NAME: kha-frontend
  APP_PORT: "8500"

jobs:
  build-test-deploy:
    runs-on: self-hosted
    environment: MacMini

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Test
        run: npm test
        working-directory: frontend

      - name: Unlock macOS Keychain
        run: security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and export Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy container
        run: |
          docker rm -f "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "$APP_PORT:$APP_PORT" \
            -e "OPENCLAW_OFFICE_DATA_SOURCE=live" \
            -e "OPENCLAW_AGENT_STATUS_URL=${{ vars.BACKEND_INTERNAL_URL }}/v1/agents/status" \
            -e "OPENCLAW_GATEWAY_LATEST_STATUS_URL=${{ vars.BACKEND_INTERNAL_URL }}/v1/gateway/status/latest" \
            -e "OPENCLAW_GATEWAY_STATUS_URL=${{ vars.BACKEND_INTERNAL_URL }}/v1/gateway/status" \
            -e "AI_TOPICS_DATA_SOURCE=backend" \
            -e "AI_TOPICS_API_BASE_URL=${{ vars.BACKEND_INTERNAL_URL }}" \
            "${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Verify deployment
        run: |
          sleep 5
          if ! docker ps --filter "name=$CONTAINER_NAME" | grep -q "$CONTAINER_NAME"; then
            echo "Deployment failed! Container is not running."
            docker logs "$CONTAINER_NAME"
            exit 1
          fi
          echo "Deployment successful."

      - name: Clean up dangling images
        run: docker image prune -f
