services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ws://localhost:8080/v1/ws
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
    ports:
      - "3000:8500"
    environment:
      - OPENCLAW_OFFICE_DATA_SOURCE=live
      - OPENCLAW_AGENT_STATUS_URL=http://backend:8080/v1/agents/status
      - OPENCLAW_GATEWAY_LATEST_STATUS_URL=http://backend:8080/v1/gateway/status/latest
      - OPENCLAW_GATEWAY_STATUS_URL=http://backend:8080/v1/gateway/status
      - AI_TOPICS_DATA_SOURCE=backend
      - AI_TOPICS_API_BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_ORIGIN=http://localhost:3000
      - DEVICE_IDENTITY_PATH=/data/device-identity.json
    volumes:
      - backend-data:/data

volumes:
  backend-data:
